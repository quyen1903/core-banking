server:
  port: 8080

spring:
  application:
    name: quinnbank-core

  datasource:
    url: jdbc:postgresql://localhost:5432/quinnbank
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info