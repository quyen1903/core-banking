quinnbank:
  environment:
    name: staging
    tier: pre-production
    production: false

spring:
  datasource:
    url: ${QUINNBANK_STAGING_DB_URL:${QUINNBANK_DB_URL}}
    username: ${QUINNBANK_STAGING_DB_USERNAME:${QUINNBANK_DB_USERNAME}}
    password: ${QUINNBANK_STAGING_DB_PASSWORD:${QUINNBANK_DB_PASSWORD}}

logging:
  level:
    root: INFO
    com.quinnbank.core: INFO
